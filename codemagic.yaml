workflows:
  ios-workflow:
    name: iOS Build

    integrations:
      app_store_connect: Codemagic 

    environment:
      flutter: 3.27.1
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.homesloc.app 
        

    scripts:
      - name: Install dependencies
        script: flutter pub get

      - name: Set up code signing   # 🔥 IMPORTANT
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true